<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic-Tac-Toe</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Orbitron:wght@700&display=swap" rel="stylesheet">
</head>
<body>

<div class="game">
  <h1>TIC TAC TOE</h1>
 
  <div class="display">
    <div id="turn-message"></div>
    <div id="result-message"></div>
  </div>


  <div id="game-board"></div>
  
  <div class="game-header">
    <input type="text" id="player-one" placeholder="Player 1">
    <input type="text" id="player-two" placeholder="Player 2">
    <button id="start-btn">Play</button>
    <button id="reset-btn">Reset</button>
  </div>

  

</div>



  <script src="./index.js"></script>
</body>
</html>
